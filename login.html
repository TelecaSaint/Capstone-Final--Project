<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Quest - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.8s ease;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.8s ease;
        }

        .login-title {
            font-size: 3.5em;
            font-weight: 900;
            color: white;
            margin-bottom: 10px;
            letter-spacing: 3px;
            font-family: Impact, sans-serif;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            animation: pulse 2s ease infinite;
        }

        .login-subtitle {
            font-size: 1.4em;
            color: rgba(255,255,255,0.95);
            font-weight: 300;
        }

        .login-form {
            animation: slideUp 0.6s ease;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-wrapper {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .input-wrapper:hover {
            background: white;
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .input-wrapper:focus-within {
            background: white;
            transform: scale(1.02);
            box-shadow: 0 0 0 3px rgba(255,255,255,0.3);
        }

        .input-icon {
            font-size: 1.8em;
        }

        .input-field {
            border: none;
            background: transparent;
            flex: 1;
            font-size: 1.1em;
            outline: none;
            color: #333;
        }

        .input-field::placeholder {
            color: #999;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            cursor: pointer;
            margin: 20px 0;
            font-size: 1.1em;
        }

        .remember-me input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .btn-primary {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.6);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .login-footer {
            text-align: center;
            margin-top: 25px;
            color: white;
            font-size: 1em;
        }

        .login-footer a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .login-footer a:hover {
            text-decoration: underline;
            transform: scale(1.1);
        }

        .separator {
            margin: 0 10px;
            opacity: 0.8;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .login-title {
                font-size: 2.5em;
            }
            
            .login-subtitle {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-title">MATH QUEST</div>
            <div class="login-subtitle">The Learning RPG</div>
        </div>
        
        <form class="login-form" id="loginForm">
            <div class="input-group">
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input 
                        type="text" 
                        class="input-field" 
                        placeholder="Username or Email"
                        id="username"
                        required
                    >
                </div>
            </div>
            
            <div class="input-group">
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input 
                        type="password" 
                        class="input-field" 
                        placeholder="Password"
                        id="password"
                        required
                    >
                </div>
            </div>
            
            <label class="remember-me">
                <input type="checkbox" id="rememberMe">
                <span>Remember Me</span>
            </label>
            
            <button type="submit" class="btn-primary">
                🚀 START QUEST
            </button>
            
            <div class="login-footer">
                <a href="#forgot">Forgot Password?</a>
                <span class="separator">|</span>
                <a href="#signup">Sign Up</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username && password) {
                // Store user info (in a real app, this would be handled by backend)
                localStorage.setItem('mathQuestUser', username);
                
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            }
        });

        // Add enter key support
        document.querySelectorAll('.input-field').forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    document.getElementById('loginForm').dispatchEvent(new Event('submit'));
                }
            });
        });
    </script>
</body>
</html>
